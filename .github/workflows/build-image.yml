name: build-image

# Builda a imagem de container e publica no GitHub Container Registry (ghcr.io),
# de onde o Azure App Service (Brazil South) puxa. Roda em push na main (ignorando
# mudanças só de documentação) e sob demanda. NÃO afeta a produção atual da Netlify.
#
# Os NEXT_PUBLIC_* são valores públicos inlinados no bundle client em build time
# (secrets do repo). Os segredos de RUNTIME (DATABASE_URL, ENTRY_HASH_SECRET,
# SUPABASE_SERVICE_ROLE_KEY) NÃO entram na imagem — ficam só no App Service.

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'plans/**'
  workflow_dispatch:

concurrency:
  group: build-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login no ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata (tags e labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/johnlaff/archtime
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build e push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
